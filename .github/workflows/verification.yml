name: Vérification de l'application (AngularJS + ExpressJS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- JOB 1 : VÉRIFICATION DU BACKEND (EXPRESS) ---
  verification-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./xp-hotel

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Installer Node.js pour Express
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    - name: Installer les dépendances d'Express (node_modules)
      run: npm ci

    - name: Lancer les tests Express
      run: npm test --if-present


  # --- JOB 2 : VÉRIFICATION DU FRONTEND (ANGULARJS) ---
  verification-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ng-hotel

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Installer Node.js pour Angular
      uses: actions/setup-node@v4
      with:
        node-version: '18' 
    - name: Installer les dépendances d'Angular
      run: npm ci

    - name: Lancer les tests Angular / Build
      run: npm test --if-present